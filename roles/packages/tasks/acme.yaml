---

- name: Install ACME packages for cert management
  community.openwrt.opkg:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop:
    - acme
    - acme-acmesh-dnsapi
    - luci-app-acme

- name: Enable ACME renewal service
  community.openwrt.service:
    name: acme
    enabled: true